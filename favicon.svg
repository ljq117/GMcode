<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 高光层 -->
  <rect width="64" height="30" rx="14" fill="url(#shine)"/>
  <!-- 网格/项目卡片图标 -->
  <!-- 左上卡片 -->
  <rect x="10" y="12" width="18" height="13" rx="3" fill="rgba(255,255,255,0.9)"/>
  <!-- 右上卡片 -->
  <rect x="36" y="12" width="18" height="13" rx="3" fill="rgba(255,255,255,0.6)"/>
  <!-- 左下卡片 -->
  <rect x="10" y="30" width="18" height="13" rx="3" fill="rgba(255,255,255,0.6)"/>
  <!-- 右下卡片 -->
  <rect x="36" y="30" width="18" height="13" rx="3" fill="rgba(255,255,255,0.9)"/>
  <!-- 底部横条（装饰） -->
  <rect x="10" y="48" width="44" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <!-- 左上卡片内容线条 -->
  <rect x="13" y="16" width="10" height="2" rx="1" fill="rgba(99,102,241,0.7)"/>
  <rect x="13" y="20" width="7" height="1.5" rx="0.75" fill="rgba(99,102,241,0.4)"/>
  <!-- 右下卡片内容线条 -->
  <rect x="39" y="34" width="10" height="2" rx="1" fill="rgba(99,102,241,0.7)"/>
  <rect x="39" y="38" width="7" height="1.5" rx="0.75" fill="rgba(99,102,241,0.4)"/>
</svg>
